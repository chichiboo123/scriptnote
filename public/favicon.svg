<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Blue document cover -->
  <rect x="60" y="20" width="320" height="400" rx="18" ry="18" fill="#4a6fa5"/>
  <!-- Inner white page -->
  <rect x="90" y="60" width="260" height="320" rx="8" ry="8" fill="#e8ecf5"/>
  <!-- SCRIPT text block (blue rectangle) -->
  <rect x="105" y="75" width="230" height="70" rx="6" ry="6" fill="#4a6fa5"/>
  <!-- SCRIPT label text -->
  <text x="220" y="122" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">SCRIPT</text>
  <!-- Text lines on page -->
  <rect x="110" y="168" width="220" height="12" rx="4" fill="#c5cfe0"/>
  <rect x="110" y="193" width="190" height="12" rx="4" fill="#c5cfe0"/>
  <rect x="110" y="218" width="210" height="12" rx="4" fill="#c5cfe0"/>
  <rect x="110" y="243" width="175" height="12" rx="4" fill="#c5cfe0"/>
  <rect x="110" y="268" width="200" height="12" rx="4" fill="#c5cfe0"/>
  <rect x="110" y="293" width="160" height="12" rx="4" fill="#c5cfe0"/>
  <!-- Pencil body -->
  <g transform="translate(280, 300) rotate(-35)">
    <rect x="-15" y="-90" width="30" height="140" rx="4" fill="#b0b8c8"/>
    <rect x="-15" y="-90" width="30" height="20" rx="4" fill="#8a9ab0"/>
    <!-- Pencil tip -->
    <polygon points="-15,50 15,50 0,95" fill="#f0d070"/>
    <polygon points="-5,72 5,72 0,95" fill="#e0a060"/>
  </g>
</svg>
